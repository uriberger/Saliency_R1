### model
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_target: all
deepspeed: train/cold_start/examples/deepspeed/ds_z3_config.json

repetition_penalty: 1.05
default_system: "A conversation between user and assistant. The user asks a question, and the assistant solves it. The assistant first thinks about the reasoning process in the mind and then provides the user with the answer. The reasoning process and answer are enclosed within <think></think> tags, i.e., <think>\nThis is my reasoning.\n</think>\nThis is my answer."

### dataset
dataset: saliency_r1_llava_cot_full, saliency_r1_mulberry_sft_full
dataset_dir: /data/qiyuan/saliency_r1/llama_factory/Saliency-R1-cold/
template: qwen2_vl
cutoff_len: 16384
overwrite_cache: true
preprocessing_num_workers: 128

### output
output_dir: vision_r1_full_Qwen2.5-VL-7B-Instruct_sft_epoch2_lr5e5_warm005_8GPU_v3
logging_steps: 10
save_steps: 1000
save_total_limit: 2
save_only_model: true
save_strategy: 'steps'
plot_loss: true
overwrite_output_dir: true
report_to: wandb
run_name: vision_r1_full_Qwen2.5-VL-7B-Instruct_sft_epoch2_lr5e5_warm005_8GPU_v3


### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 5.0e-5
# weight_decay: 1.0e-4
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 540000000

### eval
val_size: 0
per_device_eval_batch_size: 8
eval_strategy: 'no'
eval_steps: 10000000
